name: build
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install ".[dev]"
        pip install pylint

    - name: Run linter
      run: |
        chmod +x lint.sh
        bash lint.sh

    - name: Run tests
      run: |
        python -m pytest tests/ -v
